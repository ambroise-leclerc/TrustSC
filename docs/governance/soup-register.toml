schema_version = 1
register_kind = "mdux-soup-register"
scope = "host-tooling-and-presentation-adapters"
owner = "MduX-rust text authoring maintainers"
yocto_policy = "Future Yocto integration consumes approved font assets, notices, manifest metadata, and generated package outputs; it does not install host baker/shader-baker tooling or their third-party crates into the target image. Presentation-adapter dependencies (ash, ash-window, raw-window-handle, winit) are Class B host-bring-up dependencies reviewed per ADR-012; see each entry's runtime_deployment and integration_path fields."

[[entries]]
component_id = "fontdue-0.9.3"
name = "fontdue"
version = "0.9.3"
classification = "SOUP"
supplier = "crates.io / fontdue maintainers"
repository = "https://github.com/mooman219/fontdue"
license = "MIT OR Apache-2.0 OR Zlib"
usage = "Loads vendored TTF bytes, computes glyph metrics, and rasterizes glyph bitmaps during host-only Roboto atlas compilation."
integration_path = "tools/trustsc-font-baker"
pinned_by = ["tools/trustsc-font-baker/Cargo.toml", "Cargo.lock"]
runtime_deployment = false
yocto_target_dependency = false
support_model = "Community-maintained crate; no medical-device qualification or vendor support agreement."
boundary_rationale = "Used only while baking approved text packages on engineering hosts. Device/runtime artifacts consume only reviewed generated package bytes and digests."
risk_controls = [
    "Keep the crate version pinned in Cargo.lock and review updates through normal dependency governance.",
    "Validate the vendored Roboto digest and byte length against assets/fonts/roboto/font-manifest.toml before rasterization.",
    "Require deterministic rebuild verification against generated/fonts/roboto-regular-16px outputs.",
]

[[entries]]
component_id = "serde-1.0.228"
name = "serde"
version = "1.0.228"
classification = "SOUP"
supplier = "crates.io / serde-rs maintainers"
repository = "https://github.com/serde-rs/serde"
license = "MIT OR Apache-2.0"
usage = "Deserializes host-only bake recipes and generated package.json inputs, and serializes reviewed bake outputs. Also deserializes authored scenario TOML (ADR-016 §4) in crates/trustsc-build, which compiles them to static Rust data consumed at runtime. Also deserializes ML bake recipes and evidence emission in tools/trustsc-ml-baker (ADR-017), and shader-bake recipes/reports in tools/trustsc-shader-baker (ADR-012)."
integration_path = "tools/trustsc-font-baker, crates/trustsc/build.rs, crates/trustsc-build (scenario compilation), tools/trustsc-ml-baker, tools/trustsc-shader-baker"
pinned_by = ["tools/trustsc-font-baker/Cargo.toml", "crates/trustsc/Cargo.toml", "crates/trustsc-build/Cargo.toml", "tools/trustsc-ml-baker/Cargo.toml", "tools/trustsc-shader-baker/Cargo.toml", "Cargo.lock"]
runtime_deployment = false
yocto_target_dependency = false
support_model = "Community-maintained crate; no medical-device qualification or vendor support agreement."
boundary_rationale = "Confined to host authoring input/output handling; no serde API crosses into the runtime package contract."
risk_controls = [
    "Use deny_unknown_fields on bake-side schemas to prevent silent config drift.",
    "Keep the crate version pinned in Cargo.lock and review updates through normal dependency governance.",
]

[[entries]]
component_id = "serde-json-1.0.150"
name = "serde_json"
version = "1.0.150"
classification = "SOUP"
supplier = "crates.io / serde-rs maintainers"
repository = "https://github.com/serde-rs/json"
license = "MIT OR Apache-2.0"
usage = "Emits deterministic host-side package.json and report.json artifacts for review and reproducibility checks, and parses approved package.json inputs into generated Rust source during mdux builds. Also parses the safetensors container header in crates/trustsc-ml-authoring (ADR-017 §6, avoiding a dedicated safetensors crate dependency), and parses/emits ML model package.json/report.json evidence in tools/trustsc-ml-baker and crates/trustsc-build model codegen, and shader package.json/report.json evidence in tools/trustsc-shader-baker (ADR-012)."
integration_path = "tools/trustsc-font-baker, crates/trustsc/build.rs, crates/trustsc-ml-authoring, tools/trustsc-ml-baker, crates/trustsc-build (model codegen), tools/trustsc-shader-baker"
pinned_by = ["tools/trustsc-font-baker/Cargo.toml", "crates/trustsc/Cargo.toml", "crates/trustsc-ml-authoring/Cargo.toml", "tools/trustsc-ml-baker/Cargo.toml", "crates/trustsc-build/Cargo.toml", "tools/trustsc-shader-baker/Cargo.toml", "Cargo.lock"]
runtime_deployment = false
yocto_target_dependency = false
support_model = "Community-maintained crate; no medical-device qualification or vendor support agreement."
boundary_rationale = "Only the generated JSON artifacts cross the boundary; the crate itself remains a host build dependency."
risk_controls = [
    "Keep the crate version pinned in Cargo.lock and review updates through normal dependency governance.",
    "Use byte-for-byte verification to confirm generated JSON artifacts match a fresh rebuild.",
]

