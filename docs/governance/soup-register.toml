[[entries]]
component_id = "toml-1.1.2+spec-1.1.0"
name = "toml"
version = "1.1.2+spec-1.1.0"
classification = "SOUP"
supplier = "crates.io / toml-rs maintainers"
repository = "https://github.com/toml-rs/toml"
license = "MIT OR Apache-2.0"
usage = "Parses font manifests and bake recipes that define approved Roboto source inputs and Yocto handoff metadata. Also parses authored scenario scripts (examples/<app>/verify/scenarios/*.toml, ADR-016 §4) in crates/mdux-build, compiling them into static ScenarioScript data at build time — no TOML parsing at runtime. ADR-017 plans to reuse this for host-only ML bake recipes in a future tools/mdux-ml-baker (not yet present)."
integration_path = "tools/mdux-font-baker, crates/mdux-build (scenario compilation) (planned: tools/mdux-ml-baker)"
pinned_by = ["tools/mdux-font-baker/Cargo.toml", "crates/mdux-build/Cargo.toml", "Cargo.lock"]
runtime_deployment = false
yocto_target_dependency = false
support_model = "Community-maintained crate; no medical-device qualification or vendor support agreement."
boundary_rationale = "TOML parsing is confined to host-side authoring configuration (font manifests/recipes, and now scenario scripts); target systems consume the already-reviewed generated outputs instead."
risk_controls = [
    "Fail parsing on invalid manifests or recipes rather than recovering silently.",
    "Keep the crate version pinned in Cargo.lock and review updates through normal dependency governance.",
]

