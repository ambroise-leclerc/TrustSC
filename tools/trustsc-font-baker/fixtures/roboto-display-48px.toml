toolchain_id = "trustsc-font-baker-fixture-v1"
unicode_version = "15.1.0"
atlas_width = 256
atlas_padding = 1

[font]
manifest = "../../../assets/fonts/roboto/font-manifest.toml"
pixel_height = 48
locales = ["en-US"]

# TextPackage validation requires at least one approved string and one compiled run; this
# reviewed digit ribbon doubles as rasterization coverage for the display digits.
[[approved_strings]]
id = "STR-DISPLAY-DIGITS"
run_id = "RUN-DISPLAY-DIGITS"
locale = "en-US"
value = "0123456789"
direction = "ltr"

[[numeric_glyph_sets]]
id = "SET-DISPLAY-DIGITS-48"
locale = "en-US"
characters = "0123456789"

# Digits-only: no prefix/suffix affixes (score display renders bare digits).
[[numeric_templates]]
id = "TPL-SEDATION-INDEX"
locale = "en-US"
glyph_set_id = "SET-DISPLAY-DIGITS-48"
max_chars = 2
allow_negative = false
