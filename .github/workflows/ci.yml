name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: "0"

jobs:
  rust-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Build workspace
        run: cargo build --locked --workspace

      - name: Run test suite
        run: cargo test --locked --quiet

      - name: Verify generated Roboto artifacts
        run: cargo run --locked -q -p mdux-font-baker -- verify tools/mdux-font-baker/fixtures/roboto-demo.toml generated/fonts/roboto-regular-16px/package.json generated/fonts/roboto-regular-16px/report.json

      - name: Run headless hello world smoke test
        run: cargo run --locked -q -p hello_world -- --headless-smoke
