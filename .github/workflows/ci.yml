name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: "0"

jobs:
  rust-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install lavapipe (Mesa's Vulkan software rasterizer, ADR-016 §8)
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends mesa-vulkan-drivers libvulkan1

      - name: Build workspace
        run: cargo build --locked --workspace

      - name: Run test suite
        run: cargo test --locked --quiet

      - name: Lint regulatory citations and Justification blocks (ADR-020)
        run: cargo run --locked -q -p trustsc-docs-lint -- check

      - name: Verify generated Roboto artifacts
        run: cargo run --locked -q -p trustsc-font-baker -- verify tools/trustsc-font-baker/fixtures/roboto-demo.toml generated/fonts/roboto-regular-16px/package.json generated/fonts/roboto-regular-16px/report.json

      - name: Verify generated Roboto display (48px) artifacts
        run: cargo run --locked -q -p trustsc-font-baker -- verify tools/trustsc-font-baker/fixtures/roboto-display-48px.toml generated/fonts/roboto-display-48px/package.json generated/fonts/roboto-display-48px/report.json

      - name: Verify generated Roboto display (160px) artifacts
        run: cargo run --locked -q -p trustsc-font-baker -- verify tools/trustsc-font-baker/fixtures/roboto-display-160px.toml generated/fonts/roboto-display-160px/package.json generated/fonts/roboto-display-160px/report.json

      - name: Verify generated Acme logo image artifacts
        run: cargo run --locked -q -p trustsc-image-baker -- verify tools/trustsc-image-baker/fixtures/acme-logo.toml generated/images/acme-logo/package.json generated/images/acme-logo/report.json

      - name: Verify committed SPIR-V shader artifacts
        run: cargo run --locked -q -p trustsc-shader-baker -- verify tools/trustsc-shader-baker/fixtures/text-shaders.toml adapters/trustsc-vulkan-winit/shaders/generated adapters/trustsc-vulkan-winit/shaders/generated/report.json

      - name: Verify generated eeg-demo ML model artifacts
        run: cargo run --locked -q -p trustsc-ml-baker -- verify tools/trustsc-ml-baker/fixtures/eeg-demo.toml generated/models/eeg-demo/package.json generated/models/eeg-demo/report.json

      - name: Run headless hello world smoke test
        run: cargo run --locked -q -p hello_world -- --headless-smoke

      - name: Run headless Class C monitor smoke test
        run: cargo run --locked -q -p class_c_monitor -- --headless-smoke

      - name: MedUI Studio render bridge self-test (ADR-022, lavapipe)
        run: cargo run --locked -q -p trustsc-medui-studio -- --self-test

      - name: Verify hello world UI (ADR-016, lavapipe)
        # hello_world's greeting is only authored in en-US (it is the minimal smoke example, not
        # an i18n demonstration) -- class_c_monitor below is the example that covers --locales=all.
        run: cargo run --locked -q -p hello_world -- --verify-ui=generated/verification --locales=en-US

      - name: Verify Class C monitor UI (ADR-016, all locales, lavapipe)
        run: cargo run --locked -q -p class_c_monitor -- --verify-ui=generated/verification --locales=all

      - name: Upload UI verification evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-verification-evidence
          path: generated/verification/
          if-no-files-found: error
